<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Shopping List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>My Shopping List</h1>
    
    <form id="item-form">
      <input type="text" id="item-input" placeholder="Enter an item...">
      <button type="submit" class="submit-Btn">Add Item</button>
    </form>

    <input type="text" placeholder="Filter Items" class="filter">
    
    <ul id="item-list">
      <!-- <li class="item">Milk</li>
      <li class="item">Bread</li>
      <li class="item">Eggs</li> -->
    </ul>
    
    <button id="clear-btn">Clear All</button>
    <div class="color-btn">
    <button id="clear-btn" class="start">Start Change</button>
    <button id="clear-btn" class="stop">Stop Change</button>
    </div>
    <small>*Double press to remove items</small>
  </div>
  <script src="script.js"></script>
</body>
</html>
